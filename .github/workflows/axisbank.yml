name: Deploying Java Trail Application into the Ec2

on:
    push:
        branches: ["main"]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:

            - name: checkout code
              uses: actions/checkout@v4

            - name: Setup java
              uses: actions/setup-java@v4
              with: 
                java-version: '17'
                distribution: 'temurin'

            # - name: Build and test
            #   working-directory: axisbank
            #   run: mvn clean test

            - name: Build Code
              working-directory: axisbank
              run: mvn clean package

            - name: Check target folder
              working-directory: axisbank
              run: ls target

            - name: Build Image into Docker
              working-directory: axisbank
              run: docker build -t axisbank-app:${GITHUB_RUN_NUMBER} .  #-f axisbank/Dockerfile axisbank
      
            - name: Check image file
              run: docker image ls
      
            - name: Docker Login
              run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      
            - name: Tag name
              run: docker tag axisbank-app:${{ github.run_number }} rohitkumar4praja/axisbank-app:${{ github.run_number }}
      
            - name: push Image
              run: docker push rohitkumar4praja/axisbank-app:${{ github.run_number }}

#################################################################################
##---------------Deploy to Ec2 Server------------------------------------------
            - name: Deploy to EC2
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_HOST }}
                username: ${{ secrets.EC2_USER }}
                key: ${{ secrets.EC2_KEY }}
                script: |
                  docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
                  docker pull rohitkumar4praja/axisbank-app:${{ github.run_number }}
                  docker stop axisbank || true
                  docker rm axisbank || true
                  docker run -d -p 8080:8080 --name axisbank rohitkumar4praja/axisbank-app:${{ github.run_number }}
            